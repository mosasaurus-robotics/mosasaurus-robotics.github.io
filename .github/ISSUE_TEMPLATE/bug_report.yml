name: Bug report
description: 报告网站或在线工具的问题
title: 'bug: '
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 请说明发生了什么，以及你期望的结果。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请列出尽量具体的复现步骤。
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: 浏览器
      placeholder: 'Chrome 版本 / Edge 版本'
  - type: textarea
    id: extra
    attributes:
      label: 其他信息
      description: 可以附截图、录屏或控制台报错。
