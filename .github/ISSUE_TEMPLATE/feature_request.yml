name: Feature request
description: 提议新增站点功能或在线工具
title: 'feat: '
labels: ['enhancement']
body:
  - type: textarea
    id: need
    attributes:
      label: 需求说明
      description: 请说明要解决什么问题。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 方案建议
      description: 如果已有实现思路或参考链接，请写在这里。
  - type: dropdown
    id: area
    attributes:
      label: 涉及范围
      options:
        - 技术博客
        - 招新通知
        - 实验室新闻
        - 在线工具
        - 站点基础设施
